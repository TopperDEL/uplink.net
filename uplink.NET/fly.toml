app = "uplink-net-test"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "30s"

# Configure the access grant with:
#   fly secrets set UPLINK_TEST_ACCESS_GRANT="<access-grant>"
[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_URLS = "http://0.0.0.0:8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "512mb"
