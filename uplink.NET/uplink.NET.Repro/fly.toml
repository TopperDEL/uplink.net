app = "uplink-net-repro"
primary_region = "ams"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

  [build.args]
    UPLINK_NUGET_VERSION = "2.14.3623"

[env]
  UPLINK_REPRO_ROUNDS = "50"
  UPLINK_REPRO_CHURN = "500"
  UPLINK_REPRO_STATUS_EVERY = "50"
  UPLINK_REPRO_BUCKET_LIST_EVERY = "25"
  UPLINK_REPRO_LIST_BUCKETS = "true"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
